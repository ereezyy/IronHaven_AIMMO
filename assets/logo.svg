<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>
  
  <!-- City skyline -->
  <g fill="#00E5FF" opacity="0.6">
    <rect x="40" y="280" width="30" height="80" rx="2"/>
    <rect x="80" y="240" width="25" height="120" rx="2"/>
    <rect x="115" y="260" width="35" height="100" rx="2"/>
    <rect x="160" y="200" width="20" height="160" rx="2"/>
    <rect x="190" y="270" width="40" height="90" rx="2"/>
    <rect x="240" y="220" width="25" height="140" rx="2"/>
    <rect x="275" y="250" width="30" height="110" rx="2"/>
    <rect x="315" y="230" width="20" height="130" rx="2"/>
    <rect x="345" y="280" width="25" height="80" rx="2"/>
  </g>
  
  <!-- Grid lines -->
  <g stroke="#FF0080" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="260" x2="400" y2="260"/>
    <line x1="0" y1="340" x2="400" y2="340"/>
  </g>
  
  <!-- Neon sign -->
  <text x="200" y="120" text-anchor="middle" font-family="Impact, sans-serif" font-size="48" fill="#FF0080" filter="url(#glow)">IRON</text>
  <text x="200" y="165" text-anchor="middle" font-family="Impact, sans-serif" font-size="36" fill="#00E5FF" filter="url(#glow)">HAVEN</text>
  <text x="200" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#CCFF00" opacity="0.8">CYBERPUNK MMO</text>
</svg>
